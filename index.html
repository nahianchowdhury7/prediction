<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026 Sticker Predictor — EL Clasico Football Arena</title>
<style>
  :root{
    --paper: #f4ead0;
    --paper-dark: #e8dcb8;
    --royal: #1a3a8f;
    --royal-deep: #102561;
    --red: #d42429;
    --gold: #f2c14e;
    --gold-deep: #d6a02e;
    --ink: #2b2b2b;
    --ink-soft: #5a5650;
    --green-tick: #3a8f4f;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  /* ===== BACKGROUND TURF SLIDESHOW ===== */
  .bg-slideshow{
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    z-index: -2;
    overflow: hidden;
  }
  .bg-slideshow .slide{
    position: absolute;
    top:0; left:0; width:100%; height:100%;
    background-size: cover;
    background-position: center;
    opacity: 0;
    animation: bgFade 28s infinite;
  }
  .bg-slideshow .slide:nth-child(1){ background-image: url('assets/turf1.jpg'); animation-delay: 0s; }
  .bg-slideshow .slide:nth-child(2){ background-image: url('assets/turf2.jpg'); animation-delay: 7s; }
  .bg-slideshow .slide:nth-child(3){ background-image: url('assets/turf3.jpg'); animation-delay: 14s; }
  .bg-slideshow .slide:nth-child(4){ background-image: url('assets/turf4.jpg'); animation-delay: 21s; }
  @keyframes bgFade{
    0%{ opacity:0; }
    4%{ opacity:1; }
    21%{ opacity:1; }
    25%{ opacity:0; }
    100%{ opacity:0; }
  }
  .bg-overlay{
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    z-index: -1;
    background: rgba(244,234,208,0.78);
  }

  @font-face{
    font-family:'Bebas';
    src: local('Bebas Neue'), local('Arial Narrow Bold');
  }

  body{
    background: transparent;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(212,36,41,0.05), transparent 35%),
      radial-gradient(circle at 80% 90%, rgba(26,58,143,0.06), transparent 40%),
      repeating-linear-gradient(45deg, rgba(0,0,0,0.012) 0px, rgba(0,0,0,0.012) 1px, transparent 1px, transparent 14px);
    color: var(--ink);
    font-family: 'Arial Narrow', 'Bebas', Arial, sans-serif;
    min-height: 100vh;
    padding-bottom: 90px;
    overflow-x: hidden;
  }

  /* ===== HEADER — ALBUM COVER ===== */
  header{
    text-align:center;
    padding: 30px 16px 24px;
    background: var(--royal);
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.12), transparent 60%);
    border-bottom: 6px solid var(--gold);
    position: relative;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  }
  header::before, header::after{
    content: '⭐';
    position: absolute;
    top: 14px;
    font-size: 18px;
    color: var(--gold);
    opacity: 0.8;
  }
  header::before{ left: 18px; }
  header::after{ right: 18px; }

  .brand-logo{
    width: 72px;
    height: 72px;
    border-radius: 50%;
    margin-bottom: 8px;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
  }
  .brand-name{
    font-family: 'Bebas', Arial, sans-serif;
    font-size: clamp(26px, 6.5vw, 42px);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 900;
    margin: 0 0 6px;
    color: var(--gold);
    -webkit-text-stroke: 1px var(--ink);
    text-shadow: 2px 2px 0 var(--ink);
    line-height: 1.05;
  }
  h1{
    font-family: 'Bebas', Arial, sans-serif;
    font-size: clamp(28px, 7vw, 48px);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 900;
    margin: 4px 0 6px;
    color: var(--paper);
    -webkit-text-stroke: 1.5px var(--ink);
    text-shadow: 3px 3px 0 var(--red), 4px 4px 0 var(--ink);
  }
  h1 span{ color: var(--gold); -webkit-text-stroke: 1.5px var(--ink); }
  .sub{
    font-size: 13px;
    color: var(--paper);
    font-style: italic;
    opacity: 0.85;
  }

  /* sticker count strip */
  .progress-wrap{ max-width: 640px; margin: 18px auto 0; padding: 0 16px; }
  .progress-track{
    height: 14px;
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
    overflow:hidden;
    border: 2px solid var(--ink);
    position: relative;
  }
  .progress-fill{
    height:100%; width:0%;
    background: repeating-linear-gradient(45deg, var(--gold), var(--gold) 8px, var(--gold-deep) 8px, var(--gold-deep) 16px);
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .progress-label{
    text-align:center; font-size: 11px; font-weight:700;
    color: var(--paper); margin-top: 6px; text-transform: uppercase; letter-spacing:1px;
  }

  /* ===== ROUND NAV — ALBUM TABS ===== */
  .round-nav{
    display:flex; justify-content:center; gap: 5px; flex-wrap: wrap;
    margin: 18px auto 0; padding: 10px 16px;
    background: var(--royal-deep);
  }
  .round-pill{
    font-family:'Bebas', Arial, sans-serif;
    font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    padding: 7px 13px; border: 2px solid var(--paper); border-radius: 4px;
    color: var(--paper); background: transparent; font-weight:700;
  }
  .round-pill.active{
    color: var(--ink); background: var(--gold); border-color: var(--gold);
    transform: rotate(-2deg) scale(1.05);
  }
  .round-pill.done{ color: var(--ink); background: var(--paper); border-color: var(--paper); }

  /* ===== STAGE ===== */
  main{ max-width: 720px; margin: 0 auto; padding: 24px 16px; }

  .round-title{
    text-align:center; font-family:'Bebas', Arial, sans-serif;
    font-size: 20px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--red); margin-bottom: 18px; font-weight:900;
    position: relative;
  }
  .round-title::before, .round-title::after{ content:'• • •'; color: var(--gold-deep); font-size:12px; display:block; }

  .matches{ display:flex; flex-direction:column; gap: 16px; }

  .match{
    display:grid; grid-template-columns: 1fr auto 1fr;
    align-items:center; gap: 6px;
    background: var(--paper-dark);
    border: 2px dashed var(--ink-soft);
    border-radius: 12px; padding: 12px 8px;
    position:relative;
  }
  .match.decided{ border-style: solid; border-color: var(--gold-deep); }

  .vs-label{
    font-family:'Bebas', Arial, sans-serif;
    font-size: 13px; color: var(--red); font-weight: 900;
    background: var(--paper); border-radius: 50%; width:30px; height:30px;
    display:flex; align-items:center; justify-content:center;
    border: 2px solid var(--ink); flex-shrink:0;
  }

  /* ===== STICKER ===== */
  .team{
    display:flex; flex-direction:column; align-items:center; gap: 6px;
    padding: 10px 6px; cursor:pointer;
    transition: transform 0.15s ease;
  }
  .team:hover .sticker{ transform: scale(1.06) rotate(var(--tilt)); }
  .team.empty{ cursor: default; opacity: 0.35; }

  .sticker{
    --tilt: -3deg;
    width: 64px; height: 64px; border-radius: 50%;
    background: #fff;
    border: 3px solid var(--ink);
    box-shadow: 2px 3px 0 rgba(0,0,0,0.3), inset 0 0 0 2px var(--paper);
    overflow: hidden;
    position: relative;
    transform: rotate(var(--tilt));
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease;
  }
  .team:nth-of-type(2n) .sticker{ --tilt: 3deg; }
  .sticker img{
    width: 100%; height:100%; object-fit:cover;
    color: transparent;
    font-size: 0;
  }
  .sticker::after{
    content:'';
    position:absolute; top:0; left:0; right:0; height:45%;
    background: linear-gradient(180deg, rgba(255,255,255,0.5), transparent);
    pointer-events:none;
  }
  .team.empty .sticker{
    background: repeating-linear-gradient(45deg, #ddd, #ddd 4px, #eee 4px, #eee 8px);
  }

  .team.winner .sticker{
    border-color: var(--green-tick);
    box-shadow: 0 0 0 3px var(--gold), 2px 3px 0 rgba(0,0,0,0.3);
    transform: rotate(0deg) scale(1.1);
    animation: stickPop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .team.loser .sticker{
    filter: grayscale(0.85) brightness(0.8);
    transform: rotate(var(--tilt)) scale(0.88);
    opacity: 0.55;
  }

  @keyframes stickPop{
    0%{ transform: rotate(var(--tilt)) scale(0.7); }
    55%{ transform: rotate(8deg) scale(1.18); }
    100%{ transform: rotate(0deg) scale(1.1); }
  }

  .team.winner .checkmark{
    position:absolute; top:-6px; right:-6px;
    background: var(--green-tick); color:#fff;
    width:20px; height:20px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size: 12px; font-weight:900; border: 2px solid var(--paper);
    animation: tickIn 0.3s ease 0.2s backwards;
  }
  @keyframes tickIn{ from{ transform: scale(0); } to{ transform: scale(1); } }

  .team-name{
    font-size: 11px; font-weight: 700; text-align:center; line-height:1.2;
    max-width: 90px; text-transform: uppercase;
  }
  .team.loser .team-name{ color: var(--ink-soft); }

  @media (max-width: 480px){
    .sticker{ width:50px; height:50px; }
    .team-name{ font-size: 9.5px; max-width:70px; }
    .match{ padding: 10px 4px; }
    .vs-label{ width:24px; height:24px; font-size:11px; }
  }

  /* ===== CHAMPION ===== */
  .champion-stage{ text-align:center; padding: 30px 16px; position:relative; }
  .confetti-piece{
    position:fixed; top:-20px; width:10px; height:14px; opacity:0.9;
    animation: fall linear forwards; z-index: 5; pointer-events:none;
  }
  @keyframes fall{
    to{ transform: translateY(110vh) rotate(540deg); opacity:0.3; }
  }

  .trophy-emoji{ font-size: 60px; animation: trophyBounce 1.2s ease infinite; display:inline-block; }
  @keyframes trophyBounce{
    0%,100%{ transform: translateY(0) rotate(-4deg); }
    50%{ transform: translateY(-10px) rotate(4deg); }
  }

  .champ-label{
    font-family:'Bebas', Arial, sans-serif;
    font-size: 13px; letter-spacing: 3px; color: var(--red);
    text-transform:uppercase; margin: 10px 0 4px; font-weight:900;
  }
  .champ-card{
    margin: 14px auto; max-width: 280px;
    border: 4px solid var(--ink); border-radius: 18px;
    padding: 26px 20px; background: var(--gold);
    box-shadow: 5px 6px 0 rgba(0,0,0,0.25);
    transform: rotate(-1.5deg);
    animation: stickPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .champ-card .sticker{ width: 100px; height:100px; margin: 0 auto 14px; --tilt: 0deg; border-width:4px; }
  .champ-card .team-name{
    font-family:'Bebas', Arial, sans-serif;
    font-size: 24px; max-width:none; -webkit-text-stroke: 0.5px var(--ink);
  }

  /* ===== FORM ===== */
  .form-card{
    max-width: 340px; margin: 26px auto 0;
    background: var(--paper-dark); border: 3px solid var(--ink);
    border-radius: 14px; padding: 22px;
    box-shadow: 4px 5px 0 rgba(0,0,0,0.15);
  }
  .form-card label{
    display:block; font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--ink-soft); margin-bottom: 6px; margin-top: 16px; font-weight:700;
  }
  .form-card label:first-of-type{ margin-top:0; }
  .form-card input{
    width:100%; padding: 11px 13px; border-radius: 8px;
    border: 2px solid var(--ink-soft); background: var(--paper);
    color: var(--ink); font-size: 15px; font-family: inherit;
  }
  .form-card input:focus{ outline:none; border-color: var(--red); }
  .error-text{ color: var(--red); font-size: 12px; margin-top: 6px; display:none; font-weight:600; }

  /* ===== BUTTONS ===== */
  .btn-row{ display:flex; justify-content:center; gap: 12px; margin-top: 24px; flex-wrap:wrap; }
  button{
    font-family:'Bebas', Arial, sans-serif;
    font-size: 14px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 900;
    padding: 13px 24px; border-radius: 8px; border: 2px solid var(--ink); cursor: pointer;
    transition: all 0.12s ease;
  }
  .btn-primary{
    background: var(--red); color: var(--paper);
    box-shadow: 3px 4px 0 rgba(0,0,0,0.3);
  }
  .btn-primary:hover{ transform: translate(-1px,-1px); box-shadow: 4px 5px 0 rgba(0,0,0,0.3); }
  .btn-primary:active{ transform: translate(1px,2px); box-shadow: 1px 1px 0 rgba(0,0,0,0.3); }
  .btn-primary:disabled{ background: #ccc; color:#888; border-color:#999; cursor:not-allowed; box-shadow:none; }
  .btn-ghost{ background: var(--paper); color: var(--ink); }
  .btn-ghost:hover{ background: var(--paper-dark); }

  /* ===== SUCCESS ===== */
  .success-box{
    max-width: 340px; margin: 18px auto 0; text-align:center; padding: 22px;
    border-radius: 14px; border: 3px solid var(--green-tick);
    background: rgba(58,143,79,0.12); display:none;
  }
  .success-box.show{ display:block; animation: stickPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .success-box .check{ font-size: 36px; }
  .success-box h3{
    font-family:'Bebas', Arial, sans-serif;
    color: var(--green-tick); letter-spacing: 1px; text-transform: uppercase;
    font-size: 18px; margin-bottom: 4px;
  }
  .success-box p{ color: var(--ink-soft); font-size: 13px; }

  .submitting-note{ text-align:center; font-size: 12px; color: var(--ink-soft); margin-top: 10px; display:none; font-weight:600; }
  .submitting-note.show{ display:block; }

  a.leaderboard-link{
    display:inline-block; margin-top: 16px; font-family:'Bebas', Arial, sans-serif;
    font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--ink); background: var(--gold); text-decoration: none;
    border: 2px solid var(--ink); border-radius: 20px; padding: 9px 18px;
    box-shadow: 2px 3px 0 rgba(0,0,0,0.25);
  }

  footer{
    text-align:center; margin-top: 40px; font-size: 11px;
    color: var(--ink-soft); letter-spacing: 1px;
  }
  footer span{ color: var(--red); font-weight:700; }

  /* ===== BRACKET CARD MODAL ===== */
  .bc-overlay{
    position: fixed; inset:0; background: rgba(0,0,0,0.75);
    display:none; align-items:center; justify-content:center;
    z-index: 999; padding: 16px; flex-direction:column;
  }
  .bc-overlay.show{ display:flex; }
  .bc-box{
    background: var(--paper); border-radius: 14px; padding: 14px;
    max-width: 420px; width:100%; text-align:center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    max-height: 92vh; display:flex; flex-direction:column;
  }
  .bc-title{
    font-family:'Bebas', Arial, sans-serif; font-size:18px; letter-spacing:1px;
    text-transform:uppercase; color:var(--ink); margin-bottom:10px; font-weight:900;
  }
  .bc-imgwrap{ overflow:auto; border-radius:8px; border:2px solid var(--ink); margin-bottom:12px; background:#0b1d4d; }
  .bc-imgwrap img{ width:100%; display:block; }
  .bc-loading{ padding: 60px 10px; color: var(--ink-soft); font-size:13px; font-weight:600; }
  .bc-btns{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .bc-btns button{ flex:1; min-width:110px; }
  .bc-close{ margin-top:10px; background:transparent; border:none; color:var(--ink-soft); font-size:12px; text-decoration:underline; cursor:pointer; font-family:inherit; }

  /* page-turn transition */
  .page-turn-out{ animation: turnOut 0.35s ease forwards; }
  .page-turn-in{ animation: turnIn 0.4s ease backwards; }
  @keyframes turnOut{ to{ opacity:0; transform: rotateY(8deg) translateX(-20px); } }
  @keyframes turnIn{ from{ opacity:0; transform: rotateY(-8deg) translateX(20px); } to{ opacity:1; transform:none; } }
</style>
</head>
<body>

<div class="bg-slideshow">
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
</div>
<div class="bg-overlay"></div>

<header>
  <img src="assets/logo.png" alt="El Clasico Football Arena Logo" class="brand-logo">
  <div class="brand-name">El Clasico Football Arena</div>
  <h1>Ultimate <span>Predictors</span></h1>
  <div class="sub">World Cup 2026 — peel your picks, round by round</div>

  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0 of 31 stickers placed</div>
  </div>

  <div style="text-align:center; margin-top:16px;">
    <a class="leaderboard-link" href="leaderboard.html">🏆 View Leaderboard</a>
  </div>
</header>

<div class="round-nav" id="roundNav"></div>

<main id="mainStage"></main>

<footer>Made with <span>♥</span> by El Clasico Football Arena</footer>

<div class="bc-overlay" id="bcOverlay">
  <div class="bc-box">
    <div class="bc-title">🏆 Your Prediction Card</div>
    <div class="bc-imgwrap" id="bcImgWrap"><div class="bc-loading">Generating your bracket…</div></div>
    <div class="bc-btns">
      <button class="btn-primary" id="bcSaveBtn">⬇ Save</button>
      <button class="btn-ghost" id="bcShareBtn">↗ Share</button>
    </div>
    <button class="bc-close" id="bcCloseBtn">Close</button>
  </div>
</div>

<script>
/* ============== DATA ============== */
const FLAG = c => `https://flagcdn.com/w160/${c}.png`;

const R32 = [
  { id:'r32-1',  a:{n:'South Africa', c:'za'}, b:{n:'Canada', c:'ca'} },
  { id:'r32-2',  a:{n:'Brazil', c:'br'},        b:{n:'Japan', c:'jp'} },
  { id:'r32-3',  a:{n:'Germany', c:'de'},       b:{n:'Paraguay', c:'py'} },
  { id:'r32-4',  a:{n:'Netherlands', c:'nl'},   b:{n:'Morocco', c:'ma'} },
  { id:'r32-5',  a:{n:'Ivory Coast', c:'ci'},   b:{n:'Norway', c:'no'} },
  { id:'r32-6',  a:{n:'France', c:'fr'},        b:{n:'Sweden', c:'se'} },
  { id:'r32-7',  a:{n:'Mexico', c:'mx'},        b:{n:'Ecuador', c:'ec'} },
  { id:'r32-8',  a:{n:'England', c:'gb-eng'},   b:{n:'DR Congo', c:'cd'} },
  { id:'r32-9',  a:{n:'Belgium', c:'be'},       b:{n:'Senegal', c:'sn'} },
  { id:'r32-10', a:{n:'USA', c:'us'},           b:{n:'Bosnia and Herzegovina', c:'ba'} },
  { id:'r32-11', a:{n:'Spain', c:'es'},         b:{n:'Austria', c:'at'} },
  { id:'r32-12', a:{n:'Portugal', c:'pt'},      b:{n:'Croatia', c:'hr'} },
  { id:'r32-13', a:{n:'Switzerland', c:'ch'},   b:{n:'Algeria', c:'dz'} },
  { id:'r32-14', a:{n:'Australia', c:'au'},     b:{n:'Egypt', c:'eg'} },
  { id:'r32-15', a:{n:'Argentina', c:'ar'},     b:{n:'Cape Verde', c:'cv'} },
  { id:'r32-16', a:{n:'Colombia', c:'co'},      b:{n:'Ghana', c:'gh'} },
];

const ROUNDS = [
  { key:'R32', label:'Round of 32', matchCount:16 },
  { key:'R16', label:'Round of 16', matchCount:8 },
  { key:'QF',  label:'Quarter-finals', matchCount:4 },
  { key:'SF',  label:'Semi-finals', matchCount:2 },
  { key:'F',   label:'Final', matchCount:1 },
];
const TOTAL_PICKS = 16+8+4+2+1; // 31

const picks = { R32: Array(16).fill(null), R16: Array(8).fill(null), QF: Array(4).fill(null), SF: Array(2).fill(null), F: Array(1).fill(null) };
let currentRoundIndex = 0;
let champion = null;

/* ============== HELPERS ============== */
function getMatchesForRound(roundKey){
  if(roundKey === 'R32') return R32.map(m => ({a:m.a, b:m.b}));
  const prevKey = ROUNDS[ROUNDS.findIndex(r=>r.key===roundKey)-1].key;
  const prevPicks = picks[prevKey];
  const matches = [];
  for(let i=0; i<prevPicks.length; i+=2){
    matches.push({ a: prevPicks[i] || null, b: prevPicks[i+1] || null });
  }
  return matches;
}

function isRoundComplete(roundKey){ return picks[roundKey].every(p => p !== null); }

function totalPicksMade(){
  let c = 0;
  for(const r of ROUNDS) c += picks[r.key].filter(p=>p!==null).length;
  return c;
}

function resetDownstream(fromRoundIdx){
  for(let i=fromRoundIdx+1; i<ROUNDS.length; i++){
    picks[ROUNDS[i].key] = Array(ROUNDS[i].matchCount).fill(null);
  }
  champion = null;
}

/* ============== CONFETTI ============== */
function launchConfetti(){
  const colors = ['#d42429','#f2c14e','#1a3a8f','#3a8f4f','#f4ead0'];
  for(let i=0; i<60; i++){
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random()*100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.animationDuration = (2.2 + Math.random()*1.8) + 's';
    piece.style.animationDelay = (Math.random()*0.5) + 's';
    piece.style.transform = `rotate(${Math.random()*360}deg)`;
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 4500);
  }
}

/* ============== RENDER ============== */
function renderNav(){
  const nav = document.getElementById('roundNav');
  nav.innerHTML = '';
  ROUNDS.forEach((r, idx) => {
    const pill = document.createElement('div');
    pill.className = 'round-pill';
    if(idx === currentRoundIndex) pill.className += ' active';
    else if(isRoundComplete(r.key)) pill.className += ' done';
    pill.textContent = r.label;
    pill.onclick = () => {
      if(idx === 0 || isRoundComplete(ROUNDS[idx-1].key)){
        currentRoundIndex = idx;
        render();
      }
    };
    nav.appendChild(pill);
  });
}

function renderProgress(){
  const made = totalPicksMade();
  document.getElementById('progressFill').style.width = (made/TOTAL_PICKS*100) + '%';
  document.getElementById('progressLabel').textContent = `${made} of ${TOTAL_PICKS} stickers placed`;
}

function teamHtml(team, isWinner, isLoser, isEmpty){
  if(isEmpty || !team){
    return `<div class="team empty"><div class="sticker"></div><div class="team-name">TBD</div></div>`;
  }
  let cls = 'team';
  if(isWinner) cls += ' winner';
  if(isLoser) cls += ' loser';
  return `<div class="${cls}" data-action="pick">
            <div class="sticker"><img src="${FLAG(team.c)}" alt="${team.n} flag" loading="lazy">${isWinner?'<div class="checkmark">✓</div>':''}</div>
            <div class="team-name">${team.n}</div>
          </div>`;
}

function renderRoundStage(animateIn){
  const round = ROUNDS[currentRoundIndex];
  const matches = getMatchesForRound(round.key);
  const main = document.getElementById('mainStage');

  let html = `<div class="round-title">${round.label}</div><div class="matches">`;

  matches.forEach((m, idx) => {
    const winner = picks[round.key][idx];
    const aIsWinner = winner && m.a && winner.n === m.a.n;
    const bIsWinner = winner && m.b && winner.n === m.b.n;
    const aIsLoser = winner && m.a && !aIsWinner;
    const bIsLoser = winner && m.b && !bIsWinner;

    html += `<div class="match match-${idx} ${winner?'decided':''}" data-round="${round.key}" data-idx="${idx}">
        <div data-side="a">${teamHtml(m.a, aIsWinner, aIsLoser, !m.a)}</div>
        <div class="vs-label">VS</div>
        <div data-side="b">${teamHtml(m.b, bIsWinner, bIsLoser, !m.b)}</div>
      </div>`;
  });

  html += `</div>`;

  const roundComplete = isRoundComplete(round.key);
  const isLastRound = currentRoundIndex === ROUNDS.length - 1;

  html += `<div class="btn-row">`;
  if(currentRoundIndex > 0){
    html += `<button class="btn-ghost" id="backBtn">← Back</button>`;
  }
  if(roundComplete){
    if(isLastRound){
      champion = picks.F[0];
      html += `<button class="btn-primary" id="nextBtn">See Champion →</button>`;
    } else {
      html += `<button class="btn-primary" id="nextBtn">Next Round →</button>`;
    }
  }
  html += `</div>`;

  main.innerHTML = html;
  if(animateIn){ main.classList.remove('page-turn-in'); void main.offsetWidth; main.classList.add('page-turn-in'); }

  matches.forEach((m, idx) => {
    const matchEl = main.querySelector(`.match-${idx}`);
    if(!matchEl) return;
    ['a','b'].forEach(side => {
      const team = side === 'a' ? m.a : m.b;
      if(!team) return;
      const el = matchEl.querySelector(`[data-side="${side}"] .team`);
      if(el){
        el.addEventListener('click', () => {
          picks[round.key][idx] = team;
          resetDownstream(currentRoundIndex);
          render();
        });
      }
    });
  });

  const backBtn = document.getElementById('backBtn');
  if(backBtn) backBtn.onclick = () => { currentRoundIndex--; render(true); };

  const nextBtn = document.getElementById('nextBtn');
  if(nextBtn) nextBtn.onclick = () => {
    if(isLastRound){
      renderChampionStage();
    } else {
      currentRoundIndex++;
      render(true);
    }
  };
}

function renderChampionStage(){
  const main = document.getElementById('mainStage');
  main.innerHTML = `
    <div class="champion-stage">
      <div class="trophy-emoji">🏆</div>
      <div class="champ-label">Your Champion</div>
      <div class="champ-card">
        <div class="sticker"><img src="${FLAG(champion.c)}" alt="${champion.n} flag"></div>

      <div class="form-card">

function render(animateIn){

}

/* ============== SUBMIT ============== */
const SHEET_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxd-upBGaNtgOLOxepmbIq0o2zFt5N4a-pBdGWHjxvTUZ1d5WpYOTaf-lzQAl_3WrfnfA/exec";

function buildPayload(name, number){
  const payload = { name, number };
  ROUNDS.forEach(r => {
    picks[r.key].forEach((p, idx) => {
      payload[`${r.key}_${idx+1}`] = p ? p.n : '';
    });
  });
  payload['Champion'] = champion ? champion.n : '';
  return payload;
}

function handleSave(){
  const nameInput = document.getElementById('userName');
  const numberInput = document.getElementById('userNumber');
  const name = nameInput.value.trim();
  const number = numberInput.value.trim();

  let valid = true;
  document.getElementById('nameErr').style.display = 'none';
  document.getElementById('numberErr').style.display = 'none';
  document.getElementById('numberErr').textContent = 'Please enter a valid number';

  if(!name){ document.getElementById('nameErr').style.display = 'block'; valid = false; }
  if(!number || number.length < 6){ document.getElementById('numberErr').style.display = 'block'; valid = false; }
  if(!valid) return;

  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  document.getElementById('submittingNote').classList.add('show');

  const payload = buildPayload(name, number);

  fetch(SHEET_WEBHOOK_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  })
  .then(r => r.json())
  .then(res => {
    document.getElementById('submittingNote').classList.remove('show');

    if(res.result === 'success'){
      document.getElementById('successBox').classList.add('show');
      document.getElementById('topLeaderboardLink').style.display = 'none';
      saveBtn.style.display = 'none';
      document.getElementById('editBtn').style.display = 'none';
      launchConfetti();
      showBracketCard(name);
    } else if(res.message === 'duplicate_number'){
      saveBtn.disabled = false;
      document.getElementById('numberErr').textContent = 'This number has already submitted a prediction. Only one entry per number is allowed.';
      document.getElementById('numberErr').style.display = 'block';
    } else {
      saveBtn.disabled = false;
      alert('Something went wrong saving your prediction. Please try again.');
    }
  })
  .catch(() => {
    document.getElementById('submittingNote').classList.remove('show');
    saveBtn.disabled = false;
    alert('Something went wrong saving your prediction. Please check your internet connection and try again.');
  });
}

/* ============== BRACKET CARD GENERATOR ============== */
function loadImg(src){
  return new Promise(resolve=>{
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

function drawCircleImg(ctx, img, cx, cy, r, ring){
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.closePath();
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.clip();
  if(img) ctx.drawImage(img, cx-r, cy-r, r*2, r*2);
  ctx.restore();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.lineWidth = ring ? 4 : 2.5;
  ctx.strokeStyle = ring || '#0d1b3d';
  ctx.stroke();
}

function sideY(bodyTop, bodyHeight, sideCount, idx){
  return bodyTop + (bodyHeight/sideCount) * (idx + 0.5);
}

async function generateBracketPoster(name){
  const W = 1085, H = 1560;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // background
  const bgGrad = ctx.createRadialGradient(W/2, H*0.35, 50, W/2, H*0.35, W*0.9);
  bgGrad.addColorStop(0, '#13287a');
  bgGrad.addColorStop(1, '#060f30');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0,0,W,H);

  // header
  const logoImg = await loadImg('assets/logo.png');
  if(logoImg) drawCircleImg(ctx, logoImg, 95, 90, 55, '#f2c14e');
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ffffff';
  ctx.font = '900 50px Arial';
  ctx.fillText('EL CLASICO FOOTBALL ARENA', 170, 78);
  ctx.fillStyle = '#f2c14e';
  ctx.font = '900 34px Arial';
  ctx.fillText('ULTIMATE PREDICTOR', 170, 122);

  // round label pills
  const bodyTop = 250, bodyBottom = H - 60, bodyHeight = bodyBottom - bodyTop;
  const colXLeft  = [80, 270, 400, 505];
  const colXRight = [W-80, W-270, W-400, W-505];
  const labels = ['ROUND OF 32','ROUND OF 16','QUARTER FINALS','SEMI FINALS'];
  ctx.font = '700 14px Arial';
  ctx.textAlign = 'center';
  labels.forEach((lab, i) => {
    [colXLeft[i], colXRight[i]].forEach(x => {
      ctx.fillStyle = '#f2c14e';
      const w = ctx.measureText(lab).width + 18;
      ctx.fillRect(x-w/2, 178, w, 24);
      ctx.fillStyle = '#0d1b3d';
      ctx.fillText(lab, x, 195);
    });
  });
  ctx.fillStyle = '#f2c14e';
  const finW = ctx.measureText('FINAL').width + 26;
  ctx.fillRect(W/2-finW/2, 178, finW, 24);
  ctx.fillStyle = '#0d1b3d';
  ctx.fillText('FINAL', W/2, 195);

  // gather pick chains per side
  // side: 0 = left, 1 = right
  const roundsOrder = ['R32','R16','QF','SF'];
  const sideData = [{},{}];
  roundsOrder.forEach(rk => {
    const total = picks[rk].length;
    const half = total/2;
    sideData[0][rk] = picks[rk].slice(0, half);
    sideData[1][rk] = picks[rk].slice(half);
  });

  // preload all flag images used
  const flagCache = {};
  async function flagFor(team){
    if(!team) return null;
    if(!flagCache[team.c]) flagCache[team.c] = loadImg(FLAG(team.c));
    return flagCache[team.c];
  }

  const ringColor = '#f2c14e';

  for(let side=0; side<2; side++){
    const colX = side===0 ? colXLeft : colXRight;
    const dir = side===0 ? 1 : -1; // direction lines travel toward center

    // R32: 8 matches, two stacked circles each
    const r32 = sideData[side].R32;
    const r32Y = []; // [{top, bot}]
    for(let i=0;i<8;i++){
      const cy = sideY(bodyTop, bodyHeight, 8, i);
      const topY = cy - 26, botY = cy + 26;
      r32Y.push({top:topY, bot:botY});
      const m = r32[i];
      const aImg = await flagFor(m ? m.a : null);
      const bImg = await flagFor(m ? m.b : null);
      const winnerIsA = picks.R32[ (side===0?i:i+8) ] && m && picks.R32[(side===0?i:i+8)].n === m.a.n;
      drawCircleImg(ctx, aImg, colX[0], topY, 24, winnerIsA ? ringColor : '#0d1b3d');
      drawCircleImg(ctx, bImg, colX[0], botY, 24, !winnerIsA ? ringColor : '#0d1b3d');
    }

    // subsequent rounds
    let prevY = r32Y.map(p => ({top:p.top, bot:p.bot}));
    let prevSideCount = 8;
    const roundKeys = ['R16','QF','SF'];
    let curYCenters = [];
    for(let rIdx=0; rIdx<roundKeys.length; rIdx++){
      const rk = roundKeys[rIdx];
      const sideCount = prevSideCount/2;
      const arr = sideData[side][rk];
      curYCenters = [];
      const x = colX[rIdx+1];
      const prevX = colX[rIdx];
      for(let i=0;i<sideCount;i++){
        const cy = sideY(bodyTop, bodyHeight, sideCount, i);
        curYCenters.push(cy);
        // connector lines from two previous nodes
        let p1, p2;
        if(rIdx===0){
          const r32GlobalIdx1 = side===0 ? i*2 : i*2+8;
          const r32GlobalIdx2 = side===0 ? i*2+1 : i*2+9;
          const m1 = sideData[side].R32[i*2];
          const m2 = sideData[side].R32[i*2+1];
          const w1 = picks.R32[r32GlobalIdx1];
          const w2 = picks.R32[r32GlobalIdx2];
          const w1IsA = w1 && m1 && w1.n === m1.a.n;
          const w2IsA = w2 && m2 && w2.n === m2.a.n;
          p1 = w1IsA ? r32Y[i*2].top : r32Y[i*2].bot;
          p2 = w2IsA ? r32Y[i*2+1].top : r32Y[i*2+1].bot;
        } else {
          p1 = prevY[i*2];
          p2 = prevY[i*2+1];
        }
        const midX = (prevX + x)/2;
        ctx.strokeStyle = 'rgba(242,193,78,0.55)';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(prevX, p1); ctx.lineTo(midX, p1); ctx.lineTo(midX, cy); ctx.lineTo(x, cy);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(prevX, p2); ctx.lineTo(midX, p2); ctx.lineTo(midX, cy); ctx.lineTo(x, cy);
        ctx.stroke();

        const img = await flagFor(arr[i]);
        drawCircleImg(ctx, img, x, cy, 26, '#0d1b3d');
      }
      prevY = curYCenters;
      prevSideCount = sideCount;
    }

    // connector from each side's SF winner to center champion
    const sfY = curYCenters[0];
    const sfX = colX[3];
    const midX = (sfX + W/2)/2;
    ctx.strokeStyle = 'rgba(242,193,78,0.55)';
    ctx.beginPath();
    ctx.moveTo(sfX, sfY); ctx.lineTo(midX, sfY); ctx.lineTo(midX, H*0.5); ctx.lineTo(W/2, H*0.5);
    ctx.stroke();
  }

  // champion center
  const champImg = await flagFor(champion);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#f2c14e';
  ctx.font = '700 16px Arial';
  ctx.fillText('CHAMPION', W/2, H*0.5 - 70);
  ctx.fillStyle = '#ffffff';
  ctx.font = '900 42px Arial';
  ctx.fillText((champion ? champion.n : '').toUpperCase(), W/2, H*0.5 - 32);
  drawCircleImg(ctx, champImg, W/2, H*0.5 + 55, 60, '#f2c14e');

  ctx.font = '900 60px Arial';
  ctx.fillText('🏆', W/2, H*0.5 + 200);

  // predictor name footer
  ctx.fillStyle = '#f2c14e';
  ctx.font = '700 20px Arial';
  ctx.fillText('Predicted by ' + (name || 'Anonymous'), W/2, H - 22);

  return canvas;
}

let lastBracketCanvas = null;

async function showBracketCard(name){
  const overlay = document.getElementById('bcOverlay');
  const wrap = document.getElementById('bcImgWrap');
  wrap.innerHTML = '<div class="bc-loading">Generating your bracket…</div>';
  overlay.classList.add('show');
  try{
    const canvas = await generateBracketPoster(name);
    lastBracketCanvas = canvas;
    const dataUrl = canvas.toDataURL('image/png');
    wrap.innerHTML = `<img src="${dataUrl}" alt="Prediction bracket">`;
  } catch(e){
    wrap.innerHTML = '<div class="bc-loading">Could not generate image. Please try again.</div>';
  }
}

document.getElementById('bcCloseBtn').onclick = () => {
  document.getElementById('bcOverlay').classList.remove('show');
};

document.getElementById('bcSaveBtn').onclick = () => {
  if(!lastBracketCanvas) return;
  lastBracketCanvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'el-clasico-wc2026-prediction.png';
    a.click();
    URL.revokeObjectURL(url);
  });
};

document.getElementById('bcShareBtn').onclick = () => {
  if(!lastBracketCanvas) return;
  lastBracketCanvas.toBlob(async blob => {
    const file = new File([blob], 'el-clasico-wc2026-prediction.png', { type: 'image/png' });
    if(navigator.share && navigator.canShare && navigator.canShare({ files: [file] })){
      try{
        await navigator.share({ files: [file], title: 'My WC 2026 Prediction', text: 'My World Cup 2026 prediction — El Clasico Football Arena' });
      } catch(e){ /* user cancelled */ }
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'el-clasico-wc2026-prediction.png';
      a.click();
      URL.revokeObjectURL(url);
    }
  });
};
