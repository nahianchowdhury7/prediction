<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — WC 2026 Predictor | EL Clasico Football Arena</title>
<style>
  :root{
    --pitch-dark: #04140d;
    --gold: #d4af37;
    --gold-bright: #f3d568;
    --paper: #f4f1e6;
    --slot-empty: #0f2c1c;
    --slot-border: #1f4a30;
    --text-dim: #7fa088;
    --bronze: #b08d57;
    --silver: #c7ccd1;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background: var(--pitch-dark);
    background-image: radial-gradient(ellipse at 50% -10%, rgba(212,175,55,0.08), transparent 60%);
    color: var(--paper);
    font-family: 'Oswald', 'Arial Narrow', sans-serif;
    min-height: 100vh;
    padding: 28px 16px 70px;
  }
  .wrap{ max-width: 560px; margin: 0 auto; }
  header{ text-align:center; margin-bottom: 24px; }
  .eyebrow{ font-size:11px; letter-spacing:3px; color:var(--gold); text-transform:uppercase; font-weight:600; }
  h1{ font-size: clamp(26px,6vw,38px); letter-spacing:1px; text-transform:uppercase; margin:6px 0 6px; }
  h1 span{ color: var(--gold-bright); }
  .sub{ font-size:13px; color:var(--text-dim); font-family: Georgia, serif; font-style:italic; }

  .meta-bar{
    display:flex; justify-content:center; gap:18px; margin: 18px 0 24px;
    font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;
  }
  .meta-bar b{ color: var(--gold-bright); font-size:14px; display:block; font-weight:700; }

  .row{
    display:grid; grid-template-columns: 40px 1fr auto;
    align-items:center; gap:12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--slot-border);
    border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
  }
  .row.top1{ border-color: var(--gold); background: rgba(212,175,55,0.1); }
  .row.top2{ border-color: var(--silver); }
  .row.top3{ border-color: var(--bronze); }

  .rank{ font-size:18px; font-weight:700; color: var(--text-dim); text-align:center; }
  .row.top1 .rank{ color: var(--gold-bright); }
  .row.top2 .rank{ color: var(--silver); }
  .row.top3 .rank{ color: var(--bronze); }

  .who{ min-width:0; }
  .who .name{ font-size:14px; font-weight:600; }
  .who .champ{ font-size:11px; color:var(--text-dim); margin-top:2px; }

  .score{ text-align:right; }
  .score .pts{ font-size:18px; font-weight:700; color: var(--gold-bright); }
  .score .pct{ font-size:10px; color:var(--text-dim); }

  .empty-state{
    text-align:center; padding: 50px 20px; color: var(--text-dim);
  }
  .empty-state .e{ font-size:34px; margin-bottom:10px; }

  .refresh-row{ text-align:center; margin-top:20px; }
  button{
    font-family:inherit; font-size:12px; letter-spacing:1.5px; text-transform:uppercase;
    font-weight:700; padding:10px 20px; border-radius:8px; border:1px solid var(--slot-border);
    background:transparent; color:var(--text-dim); cursor:pointer;
  }
  button:hover{ color:var(--paper); border-color:var(--gold); }

  .loading{ text-align:center; color:var(--text-dim); padding:40px; font-size:13px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">El Clasico Football Arena</div>
    <h1>WC 2026 <span>Leaderboard</span></h1>
    <div class="sub">Who called it best?</div>
  </header>

  <div class="meta-bar">
    <div>Players<b id="playerCount">—</b></div>
    <div>Max Score<b id="maxScore">—</b></div>
  </div>

  <div id="listContainer"><div class="loading">Loading leaderboard…</div></div>

  <div class="refresh-row">
    <button id="refreshBtn">Refresh</button>
  </div>
</div>

<script>
const SHEET_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxd-upBGaNtgOLOxepmbIq0o2zFt5N4a-pBdGWHjxvTUZ1d5WpYOTaf-lzQAl_3WrfnfA/exec";

function loadLeaderboard(){
  document.getElementById('listContainer').innerHTML = '<div class="loading">Loading leaderboard…</div>';

  fetch(`${SHEET_WEBHOOK_URL}?action=leaderboard`)
    .then(r => r.json())
    .then(data => render(data))
    .catch(() => {
      document.getElementById('listContainer').innerHTML =
        '<div class="empty-state"><div class="e">⚠️</div>No data yet — check back after the first match results are in.</div>';
    });
}

function render(data){
  const maxScore = data.maxScore || 62;
  const entries = data.entries || [];

  document.getElementById('maxScore').textContent = maxScore;
  document.getElementById('playerCount').textContent = entries.length;

  if(entries.length === 0){
    document.getElementById('listContainer').innerHTML =
      '<div class="empty-state"><div class="e">🏆</div>No predictions yet. Be the first to play!</div>';
    return;
  }

  let html = '';
  entries.forEach((e, idx) => {
    const rank = idx + 1;
    const pct = ((e.score / maxScore) * 100).toFixed(1);
    let rowClass = 'row';
    if(rank === 1) rowClass += ' top1';
    else if(rank === 2) rowClass += ' top2';
    else if(rank === 3) rowClass += ' top3';

    const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;

    html += `<div class="${rowClass}">
        <div class="rank">${medal}</div>
        <div class="who">
          <div class="name">${escapeHtml(e.name || 'Anonymous')}</div>
          <div class="champ">Picked: ${escapeHtml(e.champion || '—')}</div>
        </div>
        <div class="score">
          <div class="pts">${e.score}</div>
          <div class="pct">${pct}%</div>
        </div>
      </div>`;
  });

  document.getElementById('listContainer').innerHTML = html;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById('refreshBtn').onclick = loadLeaderboard;

loadLeaderboard();
</script>
</body>
</html>
